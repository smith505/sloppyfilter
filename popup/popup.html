<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SloppyFilter</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">◎</div>
      <span class="logo-text">SloppyFilter</span>
    </div>
    <span class="logo-tag">AI Slop Blocker</span>
  </div>

  <div class="hero" id="hero">
    <button class="power-btn" id="masterToggle" aria-pressed="true" title="Turn SloppyFilter on or off">
      <!-- Power symbol: IEC 5009 — vertical line through partial circle arc -->
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
        <line x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </button>
    <div class="hero-status" id="heroStatus">Blocking AI slop</div>
    <div class="hero-count">
      <span class="count-num" id="blockedCount">—</span>
      <span class="count-label">filtered this session</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">What to block</div>
    <div class="chip-grid" id="presetChips"></div>
  </div>

  <details class="adv-panel">
    <summary class="adv-summary">
      <span>Advanced options</span>
      <span class="adv-chevron">›</span>
    </summary>
    <div class="adv-body">

      <div class="adv-section">
        <div class="section-label">I want to see</div>
        <div class="input-row">
          <input type="text" id="topicInput" placeholder="fitness, AI, coding…" maxlength="40" />
          <button id="addTopic">Add</button>
        </div>
        <div id="topicTags" class="tag-list"></div>
        <label class="inline-check">
          <input type="checkbox" id="strictMode" />
          <span>Strict — only show topic matches</span>
        </label>
      </div>

      <div class="adv-section">
        <div class="section-label">Creators I always want to see</div>
        <div class="input-row">
          <input type="text" id="channelInput" placeholder="Kurzgesagt, AthleanX…" maxlength="60" />
          <button id="addChannel">Add</button>
        </div>
        <div id="channelTags" class="tag-list"></div>
      </div>

      <div class="adv-section">
        <div class="section-label">Also hide anything with</div>
        <div class="input-row">
          <input type="text" id="blockInput" placeholder="Elon Musk, NFT…" maxlength="40" />
          <button id="addBlock">Add</button>
        </div>
        <div id="blockTags" class="tag-list"></div>
      </div>

    </div>
  </details>

  <div class="footer">
    Works on <span class="site-badge yt">YouTube</span> <span class="site-badge x">X / Twitter</span>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
